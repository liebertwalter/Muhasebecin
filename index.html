<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muhasebecin Firebase Test</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.22), transparent 28%),
        linear-gradient(180deg,#07112b 0%, #0b1638 100%);
      color:#fff;
    }
    .card{
      width:min(100%,420px);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      border-radius:28px;
      padding:22px;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }
    .logo{
      width:70px;
      height:70px;
      margin:0 auto 14px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#3b82f6,#1d4ed8);
      font-size:32px;
      font-weight:800;
    }
    h1{
      margin:0;
      text-align:center;
      font-size:38px;
      font-weight:900;
    }
    p{
      text-align:center;
      color:#c7d2fe;
      margin:8px 0 20px;
    }
    input, button{
      width:100%;
      box-sizing:border-box;
      margin-top:10px;
      border:none;
      border-radius:16px;
      padding:15px 16px;
      font-size:17px;
    }
    input{
      background:rgba(255,255,255,.1);
      color:#fff;
      outline:none;
    }
    input::placeholder{
      color:#cbd5e1;
    }
    button{
      font-weight:800;
      color:#fff;
      background:linear-gradient(135deg,#3b82f6,#2563eb);
    }
    .secondary{
      background:rgba(255,255,255,.1);
    }
    #msg{
      margin-top:14px;
      min-height:22px;
      text-align:center;
      color:#dbeafe;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>Muhasebecin</h1>
    <p>Firebase test sayfası</p>

    <input id="email" placeholder="E-posta" />
    <input id="password" type="password" placeholder="Şifre" />

    <button id="registerBtn">Kayıt Ol</button>
    <button id="loginBtn">Giriş Yap</button>
    <button id="logoutBtn" class="secondary">Çıkış Yap</button>

    <div id="msg">Hazır</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQfe0kFo_2owofpOMmNdTqNwLxxsSvSKU",
      authDomain: "muhasebecinizz.firebaseapp.com",
      projectId: "muhasebecinizz",
      storageBucket: "muhasebecinizz.firebasestorage.app",
      messagingSenderId: "717751925179",
      appId: "1:717751925179:web:6b927078475e11fce96c9e",
      measurementId: "G-94R335GH2Y"
    };

    const msg = document.getElementById("msg");
    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");

    function yaz(text){
      msg.textContent = text;
    }

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      document.getElementById("registerBtn").onclick = async () => {
        try {
          const email = emailEl.value.trim();
          const password = passwordEl.value.trim();

          if (!email || !password) {
            yaz("E-posta ve şifre gir.");
            return;
          }

          const userCred = await createUserWithEmailAndPassword(auth, email, password);
          yaz("Kayıt başarılı: " + userCred.user.email);
        } catch (e) {
          yaz("Kayıt hatası: " + e.code + " / " + e.message);
        }
      };

      document.getElementById("loginBtn").onclick = async () => {
        try {
          const email = emailEl.value.trim();
          const password = passwordEl.value.trim();

          if (!email || !password) {
            yaz("E-posta ve şifre gir.");
            return;
          }

          const userCred = await signInWithEmailAndPassword(auth, email, password);
          yaz("Giriş başarılı: " + userCred.user.email);
        } catch (e) {
          yaz("Giriş hatası: " + e.code + " / " + e.message);
        }
      };

      document.getElementById("logoutBtn").onclick = async () => {
        try {
          await signOut(auth);
          yaz("Çıkış yapıldı");
        } catch (e) {
          yaz("Çıkış hatası: " + e.code + " / " + e.message);
        }
      };

      onAuthStateChanged(auth, (user) => {
        if (user) {
          yaz("Aktif kullanıcı: " + user.email);
        } else {
          yaz("Giriş yapılmadı");
        }
      });
    } catch (e) {
      yaz("Başlatma hatası: " + e.message);
    }
  </script>
</body>
</html>
