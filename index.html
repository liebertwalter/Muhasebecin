<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muhasebecin</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <script src="database.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="backup.js"></script>
  <script src="export.js"></script>
  <script src="charts.js"></script>
  <script src="notifications.js"></script>
  <script src="voice.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Muhasebecin</h1>

    <div class="toplam">
      Toplam Borç: <span id="toplam">0</span>
    </div>

    <input id="isim" type="text" placeholder="Kişi adı" />

    <button class="btn-ekle" onclick="yeniKisi()">Kişi Ekle</button>

    <input
      id="arama"
      class="search"
      type="text"
      placeholder="Kişi ara"
      oninput="aramaYap()"
    />

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
      <button class="btn-mic" onclick="sesliKomutBaslat()">🎤 Sesli Komut</button>
      <button onclick="csvIndir()">CSV İndir</button>
      <button onclick="jsonYedek()">Yedek İndir</button>
      <button onclick="yedekYukleDosyaSec()">Yedek Yükle</button>
    </div>

    <div id="liste"></div>

    <div class="card">
      <h3>Grafik</h3>
      <canvas id="grafik"></canvas>
    </div>
  </div>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      if (typeof listeyiGuncelle === "function") {
        listeyiGuncelle();
      }

      if (typeof grafikCiz === "function") {
        grafikCiz();
      }

      if (typeof hatirlaticiKontrol === "function") {
        hatirlaticiKontrol();
      }
    });
  </script>
</body>
      </html>
