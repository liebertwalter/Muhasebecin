<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muhasebecin</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="database.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="backup.js"></script>
  <script src="export.js"></script>
  <script src="charts.js"></script>
  <script src="notifications.js"></script>
  <script src="voice.js"></script>
</head>
<body>
  <div class="phone-frame">
    <div class="app-bg"></div>

    <main class="app-shell">
      <header class="topbar">
        <div class="top-user">
          <div class="avatar-wrap">
            <div class="avatar">P</div>
            <span class="online-dot"></span>
          </div>
        </div>

        <div class="top-title">
          <p class="mini-title">Kişisel Muhasebe</p>
          <h1>Muhasebecin</h1>
          <p class="sub-title">Postal Dijital tarafından oluşturuldu</p>
        </div>

        <button class="bell-btn" type="button">
          <i data-lucide="bell"></i>
          <span class="bell-badge">2</span>
        </button>
      </header>

      <section class="summary-card glass-card">
        <div class="summary-left">
          <div class="wallet-box">
            <i data-lucide="wallet"></i>
          </div>

          <div>
            <p class="card-label">Toplam Borç</p>
            <div class="summary-price">₺ <span id="toplam">0</span></div>
          </div>
        </div>

        <button class="voice-card-btn" onclick="sesliKomutBaslat()">
          <i data-lucide="mic"></i>
          <div>
            <span>Sesli Komut</span>
            <small>Komut ver</small>
          </div>
        </button>
      </section>

      <section class="search-card glass-card">
        <div class="search-input-wrap">
          <i data-lucide="search"></i>
          <input
            id="arama"
            type="text"
            placeholder="Kişi ara..."
            oninput="aramaYap()"
          />
        </div>
      </section>

      <section class="add-card glass-card">
        <div class="section-head">
          <span>Yeni Kişi Ekle</span>
        </div>

        <div class="add-row">
          <input id="isim" type="text" placeholder="Kişi Adı" />
          <button class="add-main-btn" onclick="yeniKisi()">Ekle</button>
        </div>
      </section>

      <section class="people-section">
        <div class="section-title-line">
          <div class="section-title-left">
            <i data-lucide="briefcase"></i>
            <span>Kişiler</span>
          </div>
          <div class="title-line"></div>
        </div>

        <div id="liste"></div>
      </section>

      <section class="chart-card glass-card">
        <div class="section-head">
          <span>Borç Grafiği</span>
        </div>
        <div class="chart-wrap">
          <canvas id="grafik"></canvas>
        </div>
      </section>
    </main>

    <nav class="bottom-nav glass-card">
      <button class="nav-item active" type="button">
        <i data-lucide="users"></i>
        <span>Kişiler</span>
      </button>

      <button class="nav-item" type="button">
        <i data-lucide="bar-chart-3"></i>
        <span>Raporlar</span>
      </button>

      <button class="nav-center-btn" type="button" onclick="yeniKisi()">
        <i data-lucide="plus"></i>
      </button>

      <button class="nav-item" type="button" onclick="jsonYedek()">
        <i data-lucide="database-backup"></i>
        <span>Yedekle</span>
      </button>

      <button class="nav-item" type="button">
        <i data-lucide="settings"></i>
        <span>Ayarlar</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
  <script type="module" src="firebase.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      if (typeof lucide !== "undefined") {
        lucide.createIcons();
      }

      if (typeof listeyiGuncelle === "function") {
        listeyiGuncelle();
      }

      if (typeof grafikCiz === "function") {
        grafikCiz();
      }

      if (typeof hatirlaticiKontrol === "function") {
        hatirlaticiKontrol();
      }
    });
  </script>
</body>
</html>
